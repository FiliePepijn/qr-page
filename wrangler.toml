name = "qr-page"
compatibility_date = "2025-09-18"

# Custom domain. Requires the `platour.net` zone to be in this Cloudflare
# account; Cloudflare provisions the DNS record + TLS cert automatically.
routes = [
  { pattern = "me.platour.net", custom_domain = true }
]

# Build the Vite site before deploying so ./dist exists in CI.
# Wrangler runs this command before `wrangler deploy`.
[build]
command = "npm run build"

# Deploy the built SPA as a Workers static-assets site.
# `not_found_handling = "single-page-application"` serves index.html for
# client-side routes so deep links don't 404.
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
